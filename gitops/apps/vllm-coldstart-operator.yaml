apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vllm-coldstart-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MicheleCampi/vllm-coldstart-operator
    targetRevision: main
    path: chart
    helm:
      releaseName: vcso
      parameters:
        - name: example.enabled
          value: "false"
  destination:
    server: https://kubernetes.default.svc
    namespace: vllm-operator-system
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/names/categories
        - /spec/names/listKind
        - /spec/versions/0/additionalPrinterColumns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
